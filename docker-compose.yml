services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: farming
      POSTGRES_PASSWORD: farming
      POSTGRES_DB: farming_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farming -d farming_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    profiles: ["full"]
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://farming:farming@postgres:5432/farming_manager?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
